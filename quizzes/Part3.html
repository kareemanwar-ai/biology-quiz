        :root {

        }

            color: var(--text-muted);

        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .option-btn {
            background-color: #fcfcfc;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.8rem 1rem;
            text-align: left;
            font-size: 1rem;

            background-color: #f0f3f6;
            border-color: #d1d5da;
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: var(--wrong-bg);
            border-color: var(--wrong-border);
            color: var(--wrong-text);
        }

        .explanation-toggle {

            border: none;
            color: #0366d6;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 0;
            font-weight: 600;

            background-color: #f8f9fa;

            margin-bottom: 1rem;
        }

        .terms-text {

            color: var(--text-muted);

        }

        @keyframes fadeIn {

        }

            explanation: "شرح الإجابة: الإجابة هي (False) حيث يقتصر تكوين الأبواغ (Spore formation) كنوع من التكاثر اللاجنسي في البكتيريا الزرقاء (Cyanobacteria) على بعض الأشكال وحيدة الخلية (Unicellular forms) مثل (Dermocarpa) و(Chamaesiphon)، وليس الأشكال الخيطية.",
            terms: "تعريف المصطلحات:\nSpore formation (تكوين الأبواغ): آلية تكاثر لاجنسي تعتمد على تكوين أبواغ داخلية أو خارجية لتكوين أفراد خضرية جديدة.\nUnicellular forms (الأشكال وحيدة الخلية): كائنات دقيقة تتكون من خلية واحدة مستقلة تقوم بجميع الوظائف بما فيها الإنتاج البوغي."
        },
        {

            qAr: "يتكون الجدار الخلوي للـ (هيتيروكونتوفيتا) غالباً من السيليلوز.",
            options: ["True", "False"],
            correctIndex: 0,
            explanation: "شرح الإجابة: الإجابة هي (True) حيث يتكون الجدار الخلوي في مجموعة الهيتيروكونتوفيتا (Heterokontophyta)، والتي تضم طحالب متباينة الأسواط وبعض أشباه الفطريات، غالباً من مادة السيليلوز (Cellulose) ولا يحتوي على الكيتين الفطري.",
            terms: "تعريف المصطلحات:\nHeterokontophyta (هيتيروكونتوفيتا): مجموعة تصنيفية واسعة تضم كائنات تمتلك أسواطاً متباينة الطول والتركيب كالفطريات البيضية والدياتومات والطحالب البنية.\nCellulose (السيليلوز): كربوهيدرات معقدة بنائية تُشكل المكون الأساسي لجدران خلايا النباتات والعديد من الطحالب."
        },
        {
            qEn: "In the center of Funaria capsule, there is large-celled tissue known as the columella.",
            qAr: "في مركز كبسولة الفيوناريا، يوجد نسيج ذو خلايا كبيرة يُعرف بالعميد (الكولوميلا).",
            options: ["True", "False"],
            correctIndex: 0,
            explanation: "شرح الإجابة: الإجابة هي (True) حيث يحتوي المركز الداخلي للكبسولة الجرثومية البيضاوية في حزاز الفيوناريا (Funaria) على نسيج مركزي عقيم مكون من خلايا كبيرة يُسمى الكولوميلا (Columella)، ويحيط به النسيج المولد للأبواغ.",
            terms: "تعريف المصطلحات:\nFunaria (الفيوناريا): نوع من الحزازيات الحقيقية (Mosses) يمتلك كبسولة بوغية متطورة التكوين المورفولوجي.\nColumella (الكولوميلا/العميد): نسيج مركزي عقيم يعمل كدعامة ميكانيكية داخل كبسولة الأبواغ.\nCapsule (الكبسولة/العلبة): الجزء العلوي المنتفخ من الطور الجرثومي حيث تتكون وتنضج الأبواغ."
        },
        {
            qEn: "In Riccia, foot acts to absorb food from gametophyte.",
            qAr: "في الريشيا، تعمل القدم على امتصاص الغذاء من الطور المشيجي.",
            options: ["True", "False"],
            correctIndex: 1,
            explanation: "شرح الإجابة: الإجابة هي (False) لأن الطور الجرثومي في الريشيا (Riccia) هو أبسط الأطوار الجرثومية إطلاقاً ويفتقر تماماً لوجود القدم (Foot) والعنق، فكل أنسجته الداخلية خصبة منتجة للأبواغ، بينما توجد القدم الماصة في حزاز الفيوناريا.",
            terms: "تعريف المصطلحات:\nFoot (القدم): تركيب قاعدي في الطور الجرثومي لبعض الحزازيات يغوص في نسيج الطور المشيجي لامتصاص ونقل الغذاء.\nGametophyte (الطور المشيجي): النبات الحامل للأمشاج، ويوفر الحماية والغذاء للطور الجرثومي الناشئ."

        {
            qEn: "Sphagnum mosses used as first aid dressings on soldiers' wounds.",
            qAr: "استُخدمت حزازيات الإسفاجنم كضمادات للإسعافات الأولية على جروح الجنود.",
            options: ["True", "False"],
            correctIndex: 0,
            explanation: "شرح الإجابة: الإجابة هي (True) حيث استُخدمت حزازيات الإسفاجنم (Sphagnum mosses) خلال الحرب العالمية كضمادات للجروح نظراً لقدرتها العالية جداً على الامتصاص (Absorbent) واحتوائها على خصائص خفيفة مضادة للبكتيريا (Antibacterial properties).",
            terms: "تعريف المصطلحات:\nSphagnum mosses (حزازيات الإسفاجنم): حزازيات تُعرف بـ (حشائش الخث) تنمو بكثافة في المستنقعات ولديها قدرة فائقة على الاحتفاظ بالسوائل.\nAntibacterial properties (خصائص مضادة للبكتيريا): القدرة الكيميائية البيولوجية على منع نمو الميكروبات المسببة للالتهابات في الجروح."
        }
    ];

    const container = document.getElementById('quiz-container');

    quizData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';

        // Question texts
        const qEn = document.createElement('div');
        qEn.className = 'question-text';
        qEn.textContent = `${index + 1}. ${item.qEn}`;
        
        const qAr = document.createElement('div');
        qAr.className = 'question-ar';
        qAr.textContent = item.qAr;

        // Options
        const optionsGrid = document.createElement('div');
        optionsGrid.className = 'options-grid';
        
        // Explanation toggle and content
        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'explanation-toggle';
        toggleBtn.textContent = '📖 Show Explanation & Terms (إظهار الشرح والمصطلحات)';
        
        const expContent = document.createElement('div');
        expContent.className = 'explanation-content';
        
        const expText = document.createElement('div');
        expText.className = 'explanation-text';
        expText.textContent = item.explanation;
        
        const termsText = document.createElement('div');
        termsText.className = 'terms-text';
        termsText.textContent = item.terms;

        expContent.appendChild(expText);
        expContent.appendChild(termsText);

        // Logic for answering
        const buttons = [];
        item.options.forEach((optText, optIndex) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = optText;
            
            btn.addEventListener('click', () => {
                // Disable all buttons in this card after clicking
                buttons.forEach(b => b.disabled = true);
                
                if (optIndex === item.correctIndex) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                    // Highlight the correct one
                    buttons[item.correctIndex].classList.add('correct');
                }
                
                // Show the explanation toggle
                toggleBtn.style.display = 'block';
            });
            
            buttons.push(btn);
            optionsGrid.appendChild(btn);
        });

        toggleBtn.addEventListener('click', () => {
            expContent.classList.toggle('visible');
            toggleBtn.textContent = expContent.classList.contains('visible') 
                ? '📖 Hide Explanation (إخفاء الشرح)' 
                : '📖 Show Explanation & Terms (إظهار الشرح والمصطلحات)';
        });

        card.appendChild(qEn);
        card.appendChild(qAr);
        card.appendChild(optionsGrid);
        card.appendChild(toggleBtn);
        card.appendChild(expContent);

        container.appendChild(card);
    });
</script>
</body>
</html>
